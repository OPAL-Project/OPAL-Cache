version: '3'
services:
    mongodb:
        image: mongo:latest@sha256:f9969bdb955c7144d81e2e33b10be787fadf871ec2c119444b622be914b0acc7
        environment:
            - MONGO_DATA_DIR=/data/mongodb
            - MONGO_LOG_DIR=/dev/null
            - MONGODB_DBNAME=opal
        command: mongod --smallfiles --logpath=/dev/null # --quiet
        ports:
            - 27017:27017

    cache:
        build:
            context: .
        depends_on:
            - mongodb
        links:
            - mongodb
        ports:
            - 80:80
